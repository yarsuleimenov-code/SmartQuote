<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zaberman LLC Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-100 text-slate-700 flex items-center justify-center p-6">
  <main class="w-full max-w-md bg-white border border-slate-200 rounded-lg shadow-sm p-6">
    <div class="mb-6">
      <p class="text-sm text-slate-400">Zaberman LLC</p>
      <h1 class="text-2xl font-bold text-slate-900 mt-1">Admin Access</h1>
    </div>

    <form id="adminLoginForm" class="space-y-4">
      <label class="block">
        <span class="text-sm font-semibold text-slate-700">Admin token</span>
        <input id="adminToken" type="password" autocomplete="current-password" class="mt-2 w-full rounded-lg border border-slate-300 px-3 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-teal-500" required />
      </label>

      <p id="loginMessage" class="hidden rounded-lg px-3 py-2 text-sm"></p>

      <button class="w-full rounded-lg bg-slate-900 text-white px-4 py-3 font-semibold hover:bg-slate-800" type="submit">
        Sign In
      </button>
    </form>

    <a href="index.html" class="mt-4 block text-center text-sm text-slate-500 hover:text-slate-800">
      Back to calculator
    </a>
  </main>

  <script>
    const form = document.getElementById("adminLoginForm");
    const token = document.getElementById("adminToken");
    const message = document.getElementById("loginMessage");
    const params = new URLSearchParams(window.location.search);
    const rawReturnTo = params.get("returnTo") || "index.html";
    const returnTo = rawReturnTo.startsWith("/") && !rawReturnTo.startsWith("//")
      ? rawReturnTo
      : "index.html";

    function showMessage(text, type) {
      message.hidden = false;
      message.textContent = text;
      message.className = type === "error"
        ? "rounded-lg px-3 py-2 text-sm bg-red-50 text-red-700 border border-red-200"
        : "rounded-lg px-3 py-2 text-sm bg-green-50 text-green-700 border border-green-200";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      showMessage("Checking token...", "success");

      try {
        const response = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: token.value }),
        });
        const data = await response.json();

        if (!response.ok || !data.success) {
          showMessage(data.error || "Invalid admin token.", "error");
          return;
        }

        window.localStorage.setItem("zabermanUserRole", "admin");
        window.location.assign(returnTo);
      } catch {
        showMessage("Login request failed. Check the deployment configuration.", "error");
      }
    });
  </script>
</body>

</html>
