<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zaberman LLC Pricing Calculator | Variables</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon-180.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-100 text-slate-700">
<div class="min-h-screen flex">
  <div id="sidebar"></div>

  <main class="ml-64 w-full">
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-30">
      <div>
        <p class="text-xs text-slate-400">Zaberman LLC / Broker Calculator</p>
        <h2 class="text-lg font-semibold text-slate-800">Variables</h2>
      </div>

      <div class="flex items-center gap-3">
        <span id="formulaVersionBadge" class="text-xs px-3 py-1 rounded-full bg-slate-100 text-slate-700 font-semibold">Formula</span>
        <button id="exportConfigButton" class="px-4 py-2 rounded-lg border border-slate-300 text-slate-500 bg-white opacity-60 cursor-not-allowed" disabled>
          Export Config
        </button>
        <button id="saveVariablesButton" class="px-4 py-2 rounded-lg bg-slate-300 text-white opacity-70 cursor-not-allowed" disabled>
          Save Variables
        </button>
      </div>
    </header>

    <div id="variablesRuntimeRoot" class="p-6"></div>
  </main>
</div>

<script src="js/variables.js"></script>
<script src="js/pricingConfig.js"></script>
<script src="js/variablesAdmin.js"></script>
<script src="sidebar.js"></script>
</body>
</html>
